name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Create .env file
        run: cp .env.example .env

      - name: Prepare e2e artifact directories
        run: |
          rm -rf test-results/runtime-data test-results/runtime-emails
          mkdir -p test-results/runtime-data test-results/runtime-emails

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload test artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7
